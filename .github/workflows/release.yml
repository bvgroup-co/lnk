name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate stable semver tag
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*)
              if echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
                exit 0
              fi
              ;;
          esac

          echo "Ref ${GITHUB_REF_NAME} is not a stable semver tag"
          exit 1

      - name: Print release tag diagnostics
        run: |
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          git tag --points-at HEAD --sort=-version:refname
          git describe --tags --abbrev=0 || true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
